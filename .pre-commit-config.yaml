repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_fmt
        args : 
          - --args=-recursive
      - id: terraform_validate
        args:
          - --tf-init-args=-upgrade
          - --allow-missing-comment
        files: ^development/.*\.tf$